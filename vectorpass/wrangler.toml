# VectorPass - RAG as a Service
# https://vectorpass.automators.work

name = "vectorpass"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Enable workers.dev subdomain
workers_dev = true

# Custom domain
routes = [{ pattern = "vectorpass-api.automators.work/*", zone_name = "automators.work" }]

# KV Namespaces
# Create with: wrangler kv:namespace create <NAME>
# Then update the IDs below
[[kv_namespaces]]
binding = "USERS"        # User data, API keys, verification codes
id = "YOUR_USERS_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "VECTORS"      # Vector databases per user
id = "YOUR_VECTORS_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "RATE_LIMITS"  # Rate limiting counters
id = "YOUR_RATE_LIMITS_KV_NAMESPACE_ID"

# Workers AI binding
[ai]
binding = "AI"

# Environment variables (development)
[vars]
ENVIRONMENT = "development"

# Tier limits
FREE_TIER_MAX_VECTORS = "1000"
FREE_TIER_SEARCHES_PER_DAY = "100"
STARTER_MAX_VECTORS = "50000"
STARTER_SEARCHES_PER_DAY = "10000"
PRO_MAX_VECTORS = "500000"
PRO_SEARCHES_PER_DAY = "100000"

# Email configuration
# Options: "log" (dev), "resend", "sendgrid", "mailgun"
EMAIL_SERVICE = "resend"
FROM_EMAIL = "noreply@automators.work"

# Stripe publishable key (set your own)
STRIPE_PUBLISHABLE_KEY = "pk_live_YOUR_STRIPE_PUBLISHABLE_KEY"

# Secrets (set via wrangler secret put):
# - STRIPE_WEBHOOK_SECRET
# - STRIPE_SECRET_KEY
# - EMAIL_API_KEY
# - MAILGUN_DOMAIN (if using mailgun)

# =============================================================================
# Production environment
# =============================================================================
[env.production]
vars = { ENVIRONMENT = "production", EMAIL_SERVICE = "resend" }

# Uncomment and configure for production:
# routes = [{ pattern = "vectorpass.automators.work/*", zone_name = "automators.work" }]

# Production KV namespaces (create with: wrangler kv:namespace create NAME --env production)
# [[env.production.kv_namespaces]]
# binding = "USERS"
# id = "PRODUCTION_USERS_KV_ID"

# [[env.production.kv_namespaces]]
# binding = "VECTORS"
# id = "PRODUCTION_VECTORS_KV_ID"

# [[env.production.kv_namespaces]]
# binding = "RATE_LIMITS"
# id = "PRODUCTION_RATE_LIMITS_KV_ID"
