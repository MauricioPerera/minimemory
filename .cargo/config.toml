# Optimizaciones SIMD para minimemory
#
# Para habilitar AVX2 en CPUs que lo soportan, usa:
#   RUSTFLAGS="-C target-feature=+avx2,+fma" cargo build --release
#
# O descomenta las líneas abajo SI tu CPU soporta AVX2:
# (Intel Haswell+ 2013, AMD Excavator+ 2015)
#
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "target-feature=+avx2,+fma"]
#
# [target.x86_64-pc-windows-msvc]
# rustflags = ["-C", "target-feature=+avx2,+fma"]
#
# Nota: El código tiene runtime detection y fallback automático a scalar.
# AVX2 se usará automáticamente si el CPU lo soporta en runtime.
