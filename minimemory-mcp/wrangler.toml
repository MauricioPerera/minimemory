name = "minimemory-mcp"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MinimemoryMCP" }
]

[[migrations]]
tag = "v1"
new_classes = ["MinimemoryMCP"]

[vars]
MINIMEMORY_URL = "https://minimemory.your-domain.workers.dev"

# Authentication:
# Users connect with: /sse?api_key=xxx&agent_token=yyy
# - api_key: User's API key from minimemory service
# - agent_token: Agent token created via /api/v1/agent-tokens
