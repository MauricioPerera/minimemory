name = "minimemory-service"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "development"
JWT_SECRET = "dev-jwt-secret-for-testing-only-32chars"
JWT_REFRESH_SECRET = "dev-refresh-secret-testing-only-32"

# Uncomment for production
# [env.production]
# vars = { ENVIRONMENT = "production" }

# D1 Database for persistent memory storage
[[d1_databases]]
binding = "DB"
database_name = "minimemory-db"
database_id = "fdc36497-b8ea-4bf9-b85c-9cbecbfbaa82"

# Future: R2 storage for backups
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "minimemory-backups"
